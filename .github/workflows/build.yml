name: Build DrawAssist

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Publish
      run: dotnet publish DrawAssist.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: DrawAssist
        path: bin/Release/net10.0-windows/win-x64/publish/DrawAssist.exe
